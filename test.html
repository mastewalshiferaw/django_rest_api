<script>
    // 1. Log in to get a token (Replace with your actual superuser creds for testing)
    fetch('http://127.0.0.1:8000/api/token/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: 'Jack', password: '1234567'})
    })
    .then(res => res.json())
    .then(data => {
        const token = data.access;
        // 2. Now use the token to fetch tasks
        return fetch('http://127.0.0.1:8000/api/tasks/', {
            headers: {'Authorization': 'Bearer ' + token}
        });
    })
    .then(res => res.json())
    .then(data => console.log('My Tasks:', data));
</script>
