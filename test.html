<h2>My To-Do List</h2>
<ul id="task-list"></ul>



<script>
    // 1. Log in to get a token (Replace with your actual superuser creds for testing)
    fetch('http://127.0.0.1:8000/api/token/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: 'Jack', password: '1234567'})
    })
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById('task-list');
        data.results.forEach(task => {
            const list = document.createElement('li');
            li.textContent = task.title +  (task.completed ? "✅" : "");

            if (!task.completed) {
    const btn = document.createElement('button');
    btn.textContent = "Done";

    btn.onclick = () => markTaskDone(task.id); 
    li.appendChild(btn);
}
    list.appendChild(li);

    function markTaskDone(id) {
    fetch(`http://127.0.0.1:8000/api/tasks/${id}/mark_completed/`, {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('token'), // Assuming it is stored
            'Content-Type': 'application/json'
        }
    }).then(() => location.reload()); // Refresh page to show status
}
            
        });

        const token = data.access;
        // 2. Now use the token to fetch tasks
        return fetch('http://127.0.0.1:8000/api/tasks/', {
            headers: {'Authorization': 'Bearer ' + token}
        });
    })
    .then(res => res.json())
    .then(data => console.log('My Tasks:', data));
</script>
